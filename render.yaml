services:
  - type: web
    name: prompt-atelier-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run api
    healthCheckPath: /api/health
    envVars:
      - key: PROMPT_LAB_API_HOST
        value: 0.0.0.0
      - key: PROMPT_LAB_ALLOWED_ORIGIN
        value: https://zakiefer.github.io
      - key: PROMPT_LAB_DATA_DIR
        value: /tmp/prompt-atelier
      - key: PROMPT_LAB_API_TOKEN
        generateValue: true
      - key: PROMPT_LAB_RATE_LIMIT
        value: "240"
      - key: PROMPT_LAB_WORKER_ENABLED
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
