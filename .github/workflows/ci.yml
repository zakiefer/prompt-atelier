name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Engine tests
        run: npm run test:engine

      - name: Corpus safety
        run: npm run check:corpus-safety

      - name: Quality gate
        run: npm run check:quality-gate

      - name: API route tests
        run: npm run test:api

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Visual QA
        run: |
          set -euo pipefail
          npm run api > /tmp/prompt-atelier-api.log 2>&1 &
          API_PID=$!
          npm run preview -- --port 4173 > /tmp/prompt-atelier-preview.log 2>&1 &
          PREVIEW_PID=$!
          trap 'kill $API_PID $PREVIEW_PID 2>/dev/null || true' EXIT
          for attempt in {1..60}; do
            if curl -fsS http://127.0.0.1:8787/api/health >/dev/null && curl -fsS http://127.0.0.1:4173/ >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8787/api/health >/dev/null
          curl -fsS http://127.0.0.1:4173/ >/dev/null
          npm run visual:qa -- --url http://127.0.0.1:4173/ --out /tmp/prompt-atelier-ci-visual-qa

      - name: Script syntax checks
        run: |
          for file in scripts/*.mjs; do
            node --check "$file"
          done
