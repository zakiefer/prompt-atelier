name: CI

on:
  pull_request:
  push:
    branches: ["main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Engine tests
        run: npm run test:engine

      - name: Corpus safety
        run: npm run check:corpus-safety

      - name: API route tests
        run: npm run test:api

      - name: Build
        run: npm run build

      - name: Script syntax checks
        run: |
          for file in scripts/*.mjs; do
            node --check "$file"
          done
