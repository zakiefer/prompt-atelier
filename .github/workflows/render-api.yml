name: Render API

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile.api"
      - "render.yaml"
      - "scripts/promptLabApi.mjs"
      - "scripts/deployHostedApi.mjs"
      - "scripts/seedProofRunway.mjs"
      - "scripts/exportRegressionTimeline.mjs"
      - "scripts/auditSecurityBoundary.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/render-api.yml"

permissions:
  contents: read

concurrency:
  group: render-api
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate hosted API blueprint
        run: npm run deploy:hosted-api -- --out output/hosted-api-deploy

      - name: Seed offline proof runway
        run: npm run proof:seed -- --limit 5 --out output/proof-seed-runway

      - name: Export regression timeline
        run: npm run export:regression -- --out output/regression-timeline

      - name: Audit credential boundary
        run: npm run audit:security-boundary -- --out output/security-boundary

      - name: Upload API readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: render-api-readiness
          path: |
            output/hosted-api-deploy
            output/proof-seed-runway
            output/regression-timeline
            output/security-boundary

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Trigger Render deploy
        run: |
          set -euo pipefail
          mkdir -p output/hosted-api-deploy

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            if [ -n "${RENDER_DEPLOY_HOOK_URL:-}" ]; then
              npm run deploy:hosted-api -- --out output/hosted-api-deploy --require-deploy
              exit 0
            fi
            printf '%s\n' '{"ok":false,"skipped":true,"reason":"RENDER_API_KEY plus RENDER_SERVICE_ID, or RENDER_DEPLOY_HOOK_URL, must be configured."}' > output/hosted-api-deploy/hosted-api-deploy-report.json
            exit 1
          fi

          deploy_json="$(curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --data "{\"clearCache\":\"do_not_clear\",\"commitId\":\"${GITHUB_SHA}\"}")"

          deploy_id="$(DEPLOY_JSON="$deploy_json" node -e 'const body = JSON.parse(process.env.DEPLOY_JSON); process.stdout.write(body.id || body.deploy?.id || "");')"
          if [ -z "$deploy_id" ]; then
            printf '%s\n' '{"ok":false,"reason":"Render deploy response did not include an id."}' > output/hosted-api-deploy/hosted-api-deploy-report.json
            exit 1
          fi

          status=""
          for attempt in $(seq 1 90); do
            deploys_json="$(curl -fsS "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=20" \
              -H "Authorization: Bearer ${RENDER_API_KEY}" \
              -H "Accept: application/json")"
            status="$(DEPLOY_ID="$deploy_id" DEPLOYS_JSON="$deploys_json" node -e 'const id = process.env.DEPLOY_ID; const body = JSON.parse(process.env.DEPLOYS_JSON); const rows = Array.isArray(body) ? body : body.deploys || body.results || []; const row = rows.find((item) => (item.id || item.deploy?.id) === id); process.stdout.write(row?.status || row?.deploy?.status || "missing");')"
            if [ "$status" = "live" ]; then
              break
            fi
            if [ "$status" = "build_failed" ] || [ "$status" = "update_failed" ] || [ "$status" = "canceled" ]; then
              break
            fi
            sleep 10
          done

          DEPLOY_ID="$deploy_id" STATUS="$status" node --input-type=module - <<'NODE'
          import { writeFileSync } from "node:fs";
          const ok = process.env.STATUS === "live";
          writeFileSync("output/hosted-api-deploy/hosted-api-deploy-report.json", `${JSON.stringify({
            ok,
            deploy: {
              attempted: true,
              ok,
              id: process.env.DEPLOY_ID,
              status: process.env.STATUS,
              detail: ok ? "Render deploy reached live status." : "Render deploy did not reach live status.",
            },
          }, null, 2)}\n`);
          process.exit(ok ? 0 : 1);
          NODE
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}

      - name: Upload deploy report
        uses: actions/upload-artifact@v4
        with:
          name: render-api-deploy
          path: output/hosted-api-deploy

  verify-hosted:
    needs: [validate, deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Verify hosted API when configured
        run: |
          set -euo pipefail
          if [ -z "${PROMPT_LAB_API_URL:-}" ]; then
            mkdir -p output/hosted-api-verify output/proof-seed-hosted output/regression-timeline-hosted
            printf '%s\n' '{"ok":true,"skipped":true,"reason":"PROMPT_LAB_API_URL is not configured."}' > output/hosted-api-verify/hosted-api-verify-report.json
            printf '%s\n' '{"ok":true,"skipped":true,"reason":"PROMPT_LAB_API_URL is not configured."}' > output/proof-seed-hosted/proof-seed-runway-report.json
            printf '%s\n' '{"ok":true,"skipped":true,"reason":"PROMPT_LAB_API_URL is not configured."}' > output/regression-timeline-hosted/regression-timeline.json
            exit 0
          fi
          npm run verify:hosted-api -- --out output/hosted-api-verify
          npm run proof:seed -- --limit 5 --out output/proof-seed-hosted
          npm run export:regression -- --out output/regression-timeline-hosted
        env:
          PROMPT_LAB_API_URL: ${{ secrets.PROMPT_LAB_API_URL }}
          PROMPT_LAB_API_TOKEN: ${{ secrets.PROMPT_LAB_API_TOKEN }}

      - name: Upload hosted verification artifacts
        uses: actions/upload-artifact@v4
        with:
          name: render-api-hosted-verification
          path: |
            output/hosted-api-verify
            output/proof-seed-hosted
            output/regression-timeline-hosted
