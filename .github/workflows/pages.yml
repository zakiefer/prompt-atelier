name: Deploy Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          VITE_PROMPT_ATELIER_API_BASE: ${{ secrets.PROMPT_LAB_API_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Smoke public learner view
        run: npm run smoke:hosted -- --url https://zakiefer.github.io/prompt-atelier/ --ready-timeout-ms 180000 --out output/playwright/pages-learner-smoke

      - name: Smoke public Train view
        run: npm run smoke:hosted -- --url https://zakiefer.github.io/prompt-atelier/ --ready-timeout-ms 180000 --train --out output/playwright/pages-hosted-smoke

      - name: Smoke public demo view
        run: npm run smoke:hosted -- --url https://zakiefer.github.io/prompt-atelier/ --ready-timeout-ms 180000 --demo --out output/playwright/pages-demo-smoke
